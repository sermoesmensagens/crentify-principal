<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Gemini API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #0b0e14;
            color: #fff;
        }

        .container {
            background: #161b22;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            color: #8743f2;
        }

        button {
            background: linear-gradient(135deg, #8743f2, #a855f7);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 20px;
        }

        button:hover {
            transform: scale(1.02);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #result {
            margin-top: 20px;
            padding: 20px;
            background: #0b0e14;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            min-height: 100px;
        }

        .success {
            color: #10b981;
        }

        .error {
            color: #ef4444;
        }

        .loading {
            color: #8743f2;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #0b0e14;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #9ca3af;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🧪 Teste da API do Google Gemini</h1>
        <p>Este teste verifica se a API do Gemini está configurada corretamente.</p>

        <div>
            <label for="apiKey">API Key (VITE_GEMINI_API_KEY):</label>
            <input type="text" id="apiKey" placeholder="Cole sua API key aqui...">

            <label for="testPrompt">Prompt de Teste:</label>
            <input type="text" id="testPrompt" value="Escreva um parágrafo sobre a importância da fé cristã">
        </div>

        <button onclick="testarAPI()" id="testBtn">🚀 Testar API</button>

        <div id="result"></div>
    </div>

    <script type="module">
        import { GoogleGenAI } from "https://esm.run/@google/genai";

        window.testarAPI = async function () {
            const resultDiv = document.getElementById('result');
            const testBtn = document.getElementById('testBtn');
            const apiKey = document.getElementById('apiKey').value.trim();
            const testPrompt = document.getElementById('testPrompt').value.trim();

            if (!apiKey) {
                resultDiv.innerHTML = '<p class="error">❌ Por favor, cole sua API Key no campo acima!</p>';
                return;
            }

            resultDiv.innerHTML = '<p class="loading">⏳ Testando conexão com Google Gemini...</p>';
            testBtn.disabled = true;

            try {
                console.log('🔑 API Key:', apiKey.substring(0, 10) + '...');
                console.log('📝 Prompt:', testPrompt);

                const ai = new GoogleGenAI({ apiKey: apiKey });

                const response = await ai.models.generateContent({
                    model: 'gemini-1.5-pro',
                    contents: testPrompt,
                    config: {
                        temperature: 0.7
                    }
                });

                const text = response.text;

                resultDiv.innerHTML = `
                    <p class="success">✅ SUCESSO! A API está funcionando perfeitamente!</p>
                    <hr style="margin: 20px 0; border-color: rgba(255,255,255,0.1);">
                    <p><strong>Resposta do Gemini:</strong></p>
                    <p>${text}</p>
                `;

                console.log('✅ Resposta completa:', response);

            } catch (err) {
                console.error('❌ Erro completo:', err);
                resultDiv.innerHTML = `
                    <p class="error">❌ ERRO ao conectar com a API!</p>
                    <pre style="color: #ef4444; white-space: pre-wrap; word-wrap: break-word;">${err.message || err}</pre>
                    <hr style="margin: 20px 0; border-color: rgba(255,255,255,0.1);">
                    <p><strong>Possíveis causas:</strong></p>
                    <ul>
                        <li>API Key inválida ou expirada</li>
                        <li>Limite de requisições excedido (50/dia para Gemini Pro)</li>
                        <li>Problema de rede ou CORS</li>
                        <li>Assinatura do Google AI Pro inativa</li>
                    </ul>
                `;
            } finally {
                testBtn.disabled = false;
            }
        }

        // Auto-preencher com a API key do .env se disponível
        window.addEventListener('DOMContentLoaded', () => {
            const envApiKey = import.meta.env?.VITE_GEMINI_API_KEY;
            if (envApiKey) {
                document.getElementById('apiKey').value = envApiKey;
                document.getElementById('result').innerHTML = '<p class="success">✅ API Key carregada automaticamente do .env.local</p>';
            }
        });
    </script>
</body>

</html>
