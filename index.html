<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0B0F1A" />
  <meta name="description"
    content="Sua Jornada com Propósito - Aplicativo completo para gerenciar sua vida espiritual, hábitos e projetos" />
  <link rel="manifest" href="/manifest.json?v=4" />
  <link rel="apple-touch-icon" href="/favicon.png?v=4" />
  <title>CRENTIFY - Sua Jornada com Propósito</title>
  <link rel="icon" href="/favicon.png?v=4" type="image/png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --brand-purple: #6C3BFF;
      --brand-purple-glow: rgba(108, 59, 255, 0.4);
      --brand-accent: #FF7A18;
      --brand-accent-glow: rgba(255, 122, 24, 0.3);
      --brand-accent-hot: #FF3D5A;
      --text-secondary: #B8C0D9;
      --text-muted: #6B7280;
      --surface-bg: #0B0F1A;
      --surface-secondary: #12182A;
      --surface-card: #1A2240;
    }

    body {
      font-family: 'Sora', sans-serif;
      background-color: #0B0F1A;
      color: white;
      overflow: hidden;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: #0B0F1A;
    }

    ::-webkit-scrollbar-thumb {
      background: #6C3BFF;
      border-radius: 10px;
    }

    .neon-glow {
      box-shadow: 0 0 20px var(--brand-purple-glow);
    }

    .neon-text {
      text-shadow: 0 0 10px var(--brand-purple-glow);
    }

    .neon-border {
      border-color: rgba(108, 59, 255, 0.3);
      box-shadow: inset 0 0 10px rgba(108, 59, 255, 0.1);
    }

    .glass-card {
      background: rgba(26, 34, 64, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .accent-glow {
      box-shadow: 0 0 25px var(--brand-accent-glow);
    }

    .accent-gradient {
      background: linear-gradient(135deg, #FF7A18, #FF3D5A);
    }

    .accent-gradient-hover:hover {
      box-shadow: 0 0 30px rgba(255, 122, 24, 0.4), 0 0 60px rgba(255, 61, 90, 0.2);
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Sora', 'sans-serif'],
          },
          colors: {
            brand: {
              DEFAULT: '#6C3BFF',
              light: '#8A5CFF',
              dark: '#4B2BBF',
              bg: '#0B0F1A',
              surface: '#12182A',
              card: '#1A2240',
              accent: '#FF7A18',
              'accent-warm': '#FFB347',
              'accent-hot': '#FF3D5A',
              primary: '#6C3BFF',
            },
            'c-text': {
              DEFAULT: '#FFFFFF',
              secondary: '#B8C0D9',
              muted: '#6B7280',
            }
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-brand-bg text-white">
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((registration) => {
            console.log('ServiceWorker registered:', registration.scope);
          })
          .catch((error) => {
            console.log('ServiceWorker registration failed:', error);
          });
      });
    }

    // PWA Install Prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      // Prevent the mini-infobar from appearing on mobile
      e.preventDefault();
      // Stash the event so it can be triggered later
      deferredPrompt = e;
      console.log('PWA install prompt ready');

      // Optional: Show custom install button
      // You can dispatch a custom event here to show an install button in your React app
      window.dispatchEvent(new CustomEvent('pwa-install-available'));
    });

    window.addEventListener('appinstalled', () => {
      console.log('PWA was installed');
      deferredPrompt = null;
    });
  </script>
</body>

</html>
